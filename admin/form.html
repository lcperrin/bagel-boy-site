<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BigBoyBread — Order</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin:0; padding:24px; }
    .card { max-width:720px; margin:0 auto; border:1px solid #e5e7eb; border-radius:14px; padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    input, select, button { padding:10px; border:1px solid #d1d5db; border-radius:10px; font-size:14px; }
    button.primary { background:#111827; color:#fff; border:0; cursor:pointer; }
    .right { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
    .err { color:#b91c1c; margin-top:8px; }
    .recap { background:#f9fafb; border:1px solid #eee; padding:12px; border-radius:10px; margin-top:12px; }
    @media (max-width:640px){ .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 12px;">Place an Order</h1>
    <div id="form">
      <div class="row">
        <div class="field">
          <label>Customer Name</label>
          <input id="name" placeholder="Jane Dough" required />
        </div>
        <div class="field">
          <label>Phone</label>
          <input id="phone" placeholder="(555) 123-4567" required />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Product</label>
          <select id="product"></select>
        </div>
        <div class="field">
          <label>Quantity</label>
          <input id="qty" type="number" min="1" step="1" placeholder="1" required />
        </div>
      </div>
      <div class="right">
        <button type="button" onclick="resetForm()">Reset</button>
        <button class="primary" type="button" id="submitBtn" onclick="submitOrder()">Submit</button>
      </div>
      <div id="error" class="err"></div>
      <div style="margin-top:8px; font-size:12px; color:#6b7280;">Unit price shown on confirmation.</div>
    </div>

    <div id="confirm" style="display:none;">
      <h2 style="margin:6px 0 10px;">Thanks!</h2>
      <div class="recap" id="recap"></div>
      <div class="right">
        <button class="primary" type="button" onclick="newOrder()">New Order</button>
      </div>
    </div>
  </div>

  <script>
    const PRODUCTS = ["Sourdough","Baguette","Brioche","Croissant"]; // or fetch from your own JSON

    const $ = (id) => document.getElementById(id);
    function populateProducts(){
      $("product").innerHTML = PRODUCTS.map(p=>`<option value="${p}">${p}</option>`).join("");
    }
    function resetForm(){
      ["name","phone","qty"].forEach(id => $(id).value = "");
      $("product").selectedIndex = 0;
      $("error").textContent = "";
    }
    async function submitOrder(){
      $("submitBtn").disabled = true;
      $("error").textContent = "";
      try {
        const payload = {
          name: $("name").value.trim(),
          phone: $("phone").value.trim(),
          product: $("product").value,
          qty: $("qty").value.trim()
        };
        const r = await fetch("/api/submit-order", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || "Submission failed");
        const { orderNo, item, customer, timestamp } = data;
        $("recap").innerHTML = `
          <div><strong>Order #:</strong> ${orderNo}</div>
          <div style="margin-top:6px;"><strong>Customer:</strong> ${customer.name} (${customer.phone})</div>
          <div style="margin-top:6px;"><strong>Item:</strong> ${item.product}</div>
          <div><strong>Quantity:</strong> ${item.qty}</div>
          <div><strong>Unit Price:</strong> $${Number(item.unit).toFixed(2)}</div>
          <div style="margin-top:6px; font-size:16px;"><strong>Total:</strong> $${Number(item.total).toFixed(2)}</div>
          <div style="margin-top:6px; font-size:12px; color:#6b7280;">${new Date(timestamp).toLocaleString()}</div>
        `;
        $("form").style.display = "none";
        $("confirm").style.display = "block";
        window.scrollTo({top:0, behavior:"smooth"});
      } catch(e){
        $("error").textContent = e.message || String(e);
      } finally {
        $("submitBtn").disabled = false;
      }
    }
    function newOrder(){
      resetForm();
      $("confirm").style.display = "none";
      $("form").style.display = "block";
    }
    populateProducts();
  </script>
</body>
</html>
